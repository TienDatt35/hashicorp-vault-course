name: Verify labs

on:
  push:
    branches: [main]
    paths:
      - 'labs/**'
      - '.github/workflows/verify-labs.yml'
  pull_request:
    paths:
      - 'labs/**'
      - '.github/workflows/verify-labs.yml'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      labs: ${{ steps.list.outputs.labs }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        # Find every lab folder (any folder containing a Makefile under labs/,
        # excluding the _template).
        run: |
          set -euo pipefail
          mapfile -t labs < <(find labs -mindepth 2 -name Makefile -not -path 'labs/_template/*' -printf '%h\n' | sort)
          json=$(printf '%s\n' "${labs[@]}" | jq -R . | jq -sc .)
          echo "labs=$json" >> "$GITHUB_OUTPUT"
          echo "Found labs: $json"

  verify:
    needs: discover
    if: ${{ needs.discover.outputs.labs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lab: ${{ fromJson(needs.discover.outputs.labs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vault and jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gpg curl jq lsb-release
          curl -fsSL https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
          https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vault
          vault version

      - name: Setup ${{ matrix.lab }}
        working-directory: ${{ matrix.lab }}
        run: make setup

      - name: Apply reference solution and verify
        working-directory: ${{ matrix.lab }}
        run: make solution

      - name: Stop ${{ matrix.lab }}
        if: always()
        working-directory: ${{ matrix.lab }}
        run: make stop || true
